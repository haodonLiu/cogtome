name: memory-indexer
description: |
  读取指定日期或日期范围的 memory 文件。
  支持单日（date）或范围（start_date + end_date）两种模式。
input_schema:
  type: object
  required: [memory_base_path]
  properties:
    memory_base_path:
      type: string
      description: memory 文件的基础路径（不含日期部分）
      default: "/home/haodont/.openclaw/workspace/memory"
    date:
      type: string
      description: "指定单日日期，格式：YYYY-MM-DD"
    start_date:
      type: string
      description: "范围起始日期，格式：YYYY-MM-DD"
    end_date:
      type: string
      description: "范围结束日期，格式：YYYY-MM-DD"
    include_special:
      type: array
      description: "额外读取的特殊文件，如 MEMORY.md"
      items:
        type: string

output_schema:
  type: object
  properties:
    files_read:
      type: array
      description: 成功读取的文件路径列表
    contents:
      type: array
      description: 每个文件的 {path, date, content} 对象数组
    date_range:
      type: object
      description: 实际读取的日期范围
