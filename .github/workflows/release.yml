name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Linux .deb ──────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: cd webui && npm ci && npm run build

      - name: Build binary
        run: cargo build --release

      - name: Build .deb
        run: bash packaging/deb/build-deb.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: target/cogtome_*_amd64.deb

  # ── Windows installer ──────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: cd webui && npm ci && npm run build
        shell: bash

      - name: Build binary
        run: cargo build --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        run: bash packaging/windows/build-installer.sh
        shell: bash

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: target/cogtome-*-setup.exe

  # ── Create GitHub Release ──────────────────────────────────
  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.exe
          generate_release_notes: true
